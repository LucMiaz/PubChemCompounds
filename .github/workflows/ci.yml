name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # rdkit is a conda package; install the conda-forge wheel instead
          pip install rdkit-pypi || pip install rdkit || true

      - name: Run pylint
        run: |
          pylint pubchem/ \
            --disable=C0114,C0115,C0116,R0903,W0212,W0611 \
            --fail-under=7.0

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short --cov=pubchem --cov-report=term-missing

  docs:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
          pip install rdkit-pypi || pip install rdkit || true

      - name: Build docs
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"
